<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MultiCV</title>
  <meta name="description" content="MultiCV fallback entry for static hosting">
  <script>
    (function () {
      var segments = window.location.pathname.split("/").filter(Boolean);
      var repoIndex = segments.findIndex(function (segment) {
        return segment.toLowerCase() === "multicv";
      });
      var basePath = repoIndex >= 0 ? "/" + segments.slice(0, repoIndex + 1).join("/") + "/" : "/";
      document.write('<base href="' + basePath + '">');
    }());
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
